name: foundry-test
description: "Build and run the Go unit tests (go test -short; integration tests need real infra and run elsewhere)"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include:
    - "v1/**"
    - "csil/**"        # a CSIL/contract change must still build + pass the suite
job:
  image: golang:1.25-bookworm
  command: |
    set -e
    # The worker runs this job as a non-root uid (its runner uid), which is what
    # we want: some tests assert Unix file-permission behavior that root would
    # bypass. That uid has no home directory in the golang image, so point HOME
    # and the Go caches at /tmp (writable by any uid).
    export HOME=/tmp/home GOCACHE=/tmp/gocache GOMODCACHE=/tmp/gomod GOPATH=/tmp/gopath
    mkdir -p "$HOME" "$GOCACHE" "$GOMODCACHE" "$GOPATH"

    if [ "${REACTORCIDE_WORKER_MODE:-remote}" = "local" ]; then
      cd /job/src
    else
      git clone --branch "${REACTORCIDE_HEAD_REF:-$REACTORCIDE_PR_REF}" \
        "${REACTORCIDE_HEAD_URL:-$REACTORCIDE_SOURCE_URL}" /job/src
      cd /job/src
    fi
    cd v1

    echo "=== running as uid $(id -u) ==="

    echo "=== gofmt check ==="
    UNFORMATTED=$(gofmt -l .)
    if [ -n "${UNFORMATTED}" ]; then
      echo "These files are not gofmt-clean:"
      echo "${UNFORMATTED}"
      exit 1
    fi

    echo "=== go vet ==="
    go vet ./...

    echo "=== build ==="
    go build ./...

    # -short skips the integration tests (test/integration/*), which spin up
    # Kind clusters / containers and need real infra not present in this runner.
    echo "=== test ==="
    go test -short ./...
  timeout: 1800
  priority: 10
  raw_command: true
