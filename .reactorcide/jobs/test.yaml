name: foundry-test
description: "Build and run the Go unit tests (go test -short; integration tests need real infra and run elsewhere)"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
paths:
  include:
    - "v1/**"
    - "csil/**"        # a CSIL/contract change must still build + pass the suite
job:
  image: golang:1.25-bookworm
  command: |
    set -e
    # The worker runs this job as root (the golang image's default user), but
    # some tests assert Unix file-permission behavior, which root bypasses. So
    # we clone as root and run the whole Go toolchain as an unprivileged user.
    id ci >/dev/null 2>&1 || useradd -m -d /home/ci -s /bin/bash ci

    if [ "${REACTORCIDE_WORKER_MODE:-remote}" != "local" ]; then
      git clone --branch "${REACTORCIDE_HEAD_REF:-$REACTORCIDE_PR_REF}" \
        "${REACTORCIDE_HEAD_URL:-$REACTORCIDE_SOURCE_URL}" /job/src
    fi
    chown -R ci:ci /job/src

    runuser -u ci -- bash -euc '
      export PATH=/usr/local/go/bin:$PATH
      export HOME=/home/ci GOCACHE=$HOME/.cache/go GOMODCACHE=$HOME/go/pkg/mod GOPATH=$HOME/go
      cd /job/src/v1

      echo "=== running as uid $(id -u) ==="

      echo "=== gofmt check ==="
      UNFORMATTED=$(gofmt -l .)
      if [ -n "$UNFORMATTED" ]; then
        echo "These files are not gofmt-clean:"
        echo "$UNFORMATTED"
        exit 1
      fi

      echo "=== go vet ==="
      go vet ./...

      echo "=== build ==="
      go build ./...

      # -short skips the integration tests (test/integration/*), which spin up
      # Kind clusters / containers and need real infra not present in this runner.
      echo "=== test ==="
      go test -short ./...
    '
  timeout: 1800
  priority: 10
  raw_command: true
